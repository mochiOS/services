[driver]
id = "com.mochios.usb.qemu"
name = "QEMU xHCI Controller Driver"
version = "0.1.0"
description = "User-space xHCI controller enumerator for QEMU."
developer = "mochiOS"
entry = "entry.elf"

[plugkit]
api = "1"
driver_class = "usb"

[[match]]
bus = "pci"
class = "usb"

[capabilities]
requires = [
    "usb.access",
    "memory.phys.map",
]

[provides]
interfaces = [ "usb.controller.enumeration" ]

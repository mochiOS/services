version = "1"
vendor = "mochiOS"

[[binary]]
path = "/system/services/capability.service"
kind = "service"
requires = [
    "fs.read.all",
    "fs.write.all",
    "process.spawn",
    "service.register",
    "capabilities.manage",
    "device.input",
    "ipc.client",
    "ipc.server",
    "usb.access",
]
